name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/medical-backend ./backend

      - name: Build Frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/medical-frontend ./frontend

      - name: Push Backend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/medical-backend

      - name: Push Frontend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/medical-frontend

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/medical-backend
            docker pull ${{ secrets.DOCKER_USERNAME }}/medical-frontend

            docker stop medical-backend || true
            docker stop medical-frontend || true

            docker rm medical-backend || true
            docker rm medical-frontend || true

            docker run -d -p 5000:5000 --name medical-backend \
              -e MONGO_URI="${{ secrets.MONGO_URI }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e PORT=5000 \
              ${{ secrets.DOCKER_USERNAME }}/medical-backend

            docker run -d -p 80:80 --name medical-frontend \
              ${{ secrets.DOCKER_USERNAME }}/medical-frontend